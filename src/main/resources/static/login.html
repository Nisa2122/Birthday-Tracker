<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Birthday Tracker</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <h1>Team Birthday Tracker</h1>
        <p>Sign in to view the dashboard and manage member birthdays.</p>
        <form id="login-form" method="post" action="/login">
            <label>
                Username
                <input type="text" name="username" required />
            </label>
            <label>
                Password
                <input type="password" name="password" required />
            </label>
            <button type="submit" class="primary-button">Login</button>
        </form>
        <p class="hint">Use <strong>admin</strong> / <strong>password</strong> for demo access.</p>
    </div>
</div>
<script>
    // If server-side auth is disabled, make the login button navigate to the dashboard
    const form = document.getElementById('login-form');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = '/index.html';
        });
    }
</script>
</body>
</html>
